summary: Portfolio price fetcher — daily EOD prices
description: Fetches EOD close prices for all portfolio positions via yfinance
  and writes to price_history. Also fetches live USDHKD rate into fx_rates. Runs
  daily at 5 AM SGT.
lock: '!inline u/admin/portfolio_price_fetcher.script.lock'
has_on_behalf_of: false
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    portfolio_db:
      type: object
      description: PostgreSQL connection for portfolio database
      format: resource-postgresql
  required:
    - portfolio_db
