summary: Portfolio email — daily P&L update
description: Reads positions and latest two days of prices from Postgres,
  computes day P&L per position and portfolio totals, sends HTML email. Skips on
  weekends. Runs at 5:15 AM SGT daily.
lock: '!inline u/admin/portfolio_email.script.lock'
has_on_behalf_of: false
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    gmail_smtp:
      type: object
      description: Gmail SMTP credentials
      format: resource-smtp
    portfolio_db:
      type: object
      description: PostgreSQL connection for portfolio database
      format: resource-postgresql
    recipient_email:
      type: string
      description: Email address to send the portfolio update to
      default: $var:u/admin/recipient_email
  required:
    - portfolio_db
    - gmail_smtp
