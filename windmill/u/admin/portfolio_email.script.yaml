summary: Portfolio email — daily P&L update
description: Reads positions and latest two days of prices from Postgres,
  computes day P&L per position and portfolio totals, sends HTML email. Skips on
  weekends. Runs at 5:15 AM SGT daily.
lock: '!inline u/admin/portfolio_email.script.lock'
has_on_behalf_of: false
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    deepseek_key:
      type: string
      description: ''
      default: ''
      originalType: string
    gmail_smtp:
      type: object
      description: Gmail SMTP credentials
      default: null
      properties: {}
    portfolio_db:
      type: object
      description: PostgreSQL connection for portfolio database
      default: null
      properties: {}
    recipient_email:
      type: string
      description: Email address to send the portfolio update to
      default: ''
      originalType: string
    telegram_bot_token:
      type: string
      description: ''
      default: ''
      originalType: string
    telegram_owner_id:
      type: string
      description: ''
      default: ''
      originalType: string
    wm_token:
      type: string
      description: ''
      default: ''
      originalType: string
  required:
    - portfolio_db
    - gmail_smtp
