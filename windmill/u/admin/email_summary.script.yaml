summary: Email Summary — last 24h inbox digest via Deepseek
description: >
  Reads Gmail INBOX for the last N hours via IMAP, summarises with Deepseek, and
  sends an HTML digest email. Run manually or schedule as needed.
lock: '!inline u/admin/email_summary.script.lock'
has_on_behalf_of: false
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    deepseek_key:
      type: string
      description: Deepseek API key
      default: $var:u/admin/deepseek_key
      format: password
    hours_back:
      type: integer
      description: How many hours back to scan
      default: 24
    recipient_email:
      type: string
      description: Email address to send the summary to
      default: $var:u/admin/recipient_email
    smtp_resource:
      type: object
      description: Gmail SMTP credentials (also used for IMAP read)
      default: $res:u/admin/gmail_smtp
      format: resource-smtp
  required:
    - smtp_resource
    - deepseek_key
tag: ''
