summary: F1 — Fundamentals Fetcher
description: 'Weekly fundamental data fetch for all 33 portfolio tickers. US:
  Finnhub + yfinance + FMP. HK: yfinance only. Upserts into fundamental_data
  PostgreSQL table. Schedule: Sunday 6PM SGT.'
lock: '!inline u/admin/fundamentals_fetcher.script.lock'
has_on_behalf_of: false
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    finnhub_key:
      type: string
      description: Finnhub API key
      default: $var:u/admin/finnhub_key
    portfolio_db:
      type: object
      description: Portfolio PostgreSQL connection
      default: $res:u/admin/portfolio_db
      x-windmill-resource: postgresql
  required:
    - portfolio_db
    - finnhub_key
