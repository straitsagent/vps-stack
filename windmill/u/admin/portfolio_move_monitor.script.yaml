summary: F2b — Portfolio Move Monitor
description: 'Hourly intraday alert. Silent unless portfolio moves ±1.5% or any
  position moves ±5% vs most recent close. Schedule: Mon–Fri 9AM–6PM SGT.'
lock: '!inline u/admin/portfolio_move_monitor.script.lock'
has_on_behalf_of: false
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    deepseek_key:
      type: string
      description: ''
      default: ''
      originalType: string
    gmail_smtp:
      type: object
      description: Gmail SMTP credentials
      default: {}
      properties: {}
      x-windmill-resource: smtp
    portfolio_db:
      type: object
      description: Portfolio PostgreSQL connection
      default: null
      properties: {}
      x-windmill-resource: postgresql
    recipient_email:
      type: string
      description: Email address to send move alerts to
      default: ''
      originalType: string
    telegram_bot_token:
      type: string
      description: ''
      default: ''
      originalType: string
    telegram_owner_id:
      type: string
      description: ''
      default: ''
      originalType: string
    wm_token:
      type: string
      description: ''
      default: ''
      originalType: string
  required:
    - portfolio_db
