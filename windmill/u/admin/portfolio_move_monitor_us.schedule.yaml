schedule: '0 0 9-16 * * 1-5'
timezone: America/New_York
enabled: true
script_path: u/admin/portfolio_move_monitor
is_flow: false
summary: 'Move Monitor — US session (hourly, Mon–Fri 9AM–4PM ET)'
permissioned_as: u/admin
no_flow_overlap: true
args:
  portfolio_db: "$res:u/admin/portfolio_db"
  gmail_smtp: "$res:u/admin/gmail_smtp"
  recipient_email: "$var:u/admin/recipient_email"
  telegram_bot_token: "$var:u/admin/telegram_bot_token"
  telegram_owner_id: "$var:u/admin/telegram_owner_id"
