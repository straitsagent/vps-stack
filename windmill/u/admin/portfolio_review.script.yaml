summary: F2 — Weekly Portfolio Review
description: 'Weekly portfolio review email. Week-over-week P&L, top movers by
  impact and %, Finnhub news for top movers, Deepseek commentary. Schedule:
  Saturday 8AM SGT.'
lock: '!inline u/admin/portfolio_review.script.lock'
has_on_behalf_of: false
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    deepseek_key:
      type: string
      description: Deepseek API key
      default: null
      originalType: string
    finnhub_key:
      type: string
      description: Finnhub API key
      default: null
      originalType: string
    gmail_smtp:
      type: object
      description: Gmail SMTP credentials
      default: null
      properties: {}
      x-windmill-resource: smtp
    portfolio_db:
      type: object
      description: Portfolio PostgreSQL connection
      default: null
      properties: {}
      x-windmill-resource: postgresql
    recipient_email:
      type: string
      description: Email address to send the weekly review to
      default: ''
      originalType: string
    telegram_bot_token:
      type: string
      description: ''
      default: ''
      originalType: string
    telegram_owner_id:
      type: string
      description: ''
      default: ''
      originalType: string
    wm_token:
      type: string
      description: ''
      default: ''
      originalType: string
  required:
    - portfolio_db
    - finnhub_key
    - deepseek_key
    - gmail_smtp
