summary: Workflow 1.1 — Morning News Digest
description: >
  4-section daily digest: (1) RSS headlines from Reuters/WSJ/Barrons/NYT, (2)
  Google News keyword alerts, (3) AI summaries of key newsletters, (4) other
  inbox items. Scheduled 6:30 AM SGT daily.
lock: '!inline u/admin/morning_news_digest.script.lock'
has_on_behalf_of: false
kind: script
schema:
  $schema: https://json-schema.org/draft/2020-12/schema
  type: object
  properties:
    deepseek_key:
      type: string
      description: Deepseek API key
      default: null
      format: password
      originalType: string
    portfolio_db:
      type: object
      description: ''
      default: {}
      properties: {}
    recipient_email:
      type: string
      description: Email address to send the digest to
      default: ''
      originalType: string
    smtp_resource:
      type: object
      description: Gmail SMTP credentials (also used for IMAP read)
      default: null
      format: resource-smtp
    telegram_bot_token:
      type: string
      description: ''
      default: ''
      originalType: string
    telegram_owner_id:
      type: string
      description: ''
      default: ''
      originalType: string
    wm_token:
      type: string
      description: ''
      default: ''
      originalType: string
  required:
    - smtp_resource
    - deepseek_key
tag: ''
