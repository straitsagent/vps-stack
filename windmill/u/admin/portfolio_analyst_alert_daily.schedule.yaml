schedule: '0 45 7 * * *'
timezone: Asia/Singapore
enabled: true
script_path: u/admin/portfolio_analyst_alert
is_flow: false
summary: 'Analyst Alert — 7:45 AM SGT daily'
permissioned_as: u/admin
no_flow_overlap: true
args:
  portfolio_db: "$res:u/admin/portfolio_db"
  finnhub_key: "$var:u/admin/finnhub_key"
  telegram_bot_token: "$var:u/admin/telegram_bot_token"
  telegram_owner_id: "$var:u/admin/telegram_owner_id"
